name: php-ext-xlswriter

on: [push, pull_request]

jobs:
  build-test:
    name: PHP ${{ matrix.php-versions }} on ${{ matrix.operating-system }}
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-22.04, macos-14]
        php-versions: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}

      - name: Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Build extension
        run: |
          php -m
          phpize
          ./configure --enable-reader
          make clean
          make -j2

      - name: Run PHPT tests
        run: make test TESTS="--show-diff -q"

      - name: Run leak_stress (smoke)
        run: |
          USE_ZEND_ALLOC=0 php -d extension=$(pwd)/modules/xlswriter.so \
              -n tests/leak_stress.php
        env:
          LEAK_STRESS_ITER: 50

  alpine-musl:
    name: Alpine musl (PHP 8.3)
    runs-on: ubuntu-22.04
    container:
      image: php:8.3-cli-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Toolchain
        run: |
          apk add --no-cache build-base autoconf re2c zlib-dev linux-headers

      - name: Build extension
        run: |
          phpize
          ./configure --enable-reader
          make clean
          make -j2

      - name: Run PHPT tests
        run: make test TESTS="-q"
